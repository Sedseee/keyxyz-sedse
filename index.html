<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEDSE Key System</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; text-align: center; }
        input, button, textarea { width: 100%; padding: 10px; margin-top: 10px; border-radius: 5px; border: none; box-sizing: border-box; }
        button { background: #007bff; color: white; font-weight: bold; }
        textarea { height: 150px; resize: none; background: #222; color: #00ff00; }
    </style>
</head>
<body>
    <h2>SEDSE Loader Generator</h2>
    <p>Generate your loader script below.</p>
    
    <input type="text" id="keyInput" placeholder="Enter Key (e.g., SEDSE-XXXX)">
    <button onclick="generateLoader()">Generate Loader</button>

    <textarea id="output" readonly placeholder="Your loadstring will appear here..."></textarea>

    <script>
        function generateLoader() {
            const key = document.getElementById('keyInput').value;
            if(!key) { alert("Please enter a key!"); return; }
            
            // This assumes your Cloudflare page URL. 
            const domain = window.location.origin;
            
            const loaderCode = `local key = "${key}"\nloadstring(game:HttpGet("${domain}/v1/load?key=" .. key, true))()`;
            document.getElementById('output').value = loaderCode;
        }
    </script>
</body>
</html>
