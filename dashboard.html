<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEDSE System Admin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg-base: #030712;
            --bg-surface: rgba(11, 15, 25, 0.85); /* Glass panel */
            --border-color: rgba(255, 255, 255, 0.08);
            --border-focus: #5aabf2; /* Sky Blue Accent */
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            
            --font-sans: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-base);
            /* Dark transparent overlay over your uploaded anime beach sky background */
            background-image: 
                linear-gradient(rgba(3, 7, 18, 0.85), rgba(3, 7, 18, 0.85)), 
                url('/bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0; padding: 20px;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            box-sizing: border-box;
        }

        .panel {
            width: 100%; max-width: 480px;
            background: var(--bg-surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 12px; padding: 32px 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .hidden { display: none !important; }

        h2 { margin: 0 0 24px 0; font-size: 20px; font-weight: 600; border-bottom: 1px solid var(--border-color); padding-bottom: 16px; text-align: center;}
        
        .section-label { 
            font-size: 12px; font-weight: 600; color: var(--text-muted); 
            text-transform: uppercase; letter-spacing: 0.5px; 
            margin: 24px 0 8px 0; display: block;
        }

        input, textarea, select, button {
            width: 100%; padding: 12px;
            background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border-color);
            color: var(--text-main); border-radius: 6px;
            font-family: var(--font-mono); font-size: 13px; outline: none; box-sizing: border-box;
        }
        
        input:focus, textarea:focus, select:focus { 
            border-color: var(--border-focus); 
            box-shadow: 0 0 0 2px rgba(90, 171, 242, 0.2);
        }
        textarea { height: 100px; resize: none; }

        button {
            background-color: var(--text-main); color: var(--bg-base);
            font-family: var(--font-sans); font-weight: bold; cursor: pointer; border: none; margin-top: 12px;
            transition: opacity 0.2s, transform 0.1s;
        }
        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.98); }
        button.action-btn { background-color: var(--border-focus); color: #000; }

        .flex-row { 
            display: flex; 
            gap: 12px; 
            flex-direction: row;
        }
        .flex-row select { flex: 1; margin-top: 0; }
        .flex-row button { flex: 1; margin-top: 0; }

        @media (max-width: 480px) {
            .flex-row {
                flex-direction: column;
                gap: 0px;
            }
            .flex-row button {
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>

    <div id="loginPanel" class="panel">
        <h2>Admin Authentication</h2>
        <input type="password" id="passInput" placeholder="Enter password">
        <button onclick="login()">Authenticate</button>
    </div>

    <div id="dashboardPanel" class="panel hidden">
        <h2>Dashboard Panel</h2>
        
        <span class="section-label">Source Code Deployment</span>
        <textarea id="scriptInput" placeholder="-- Paste obfuscated Lua script here"></textarea>
        <button class="action-btn" onclick="saveScript()">Deploy Script</button>

        <span class="section-label">Key Management</span>
        <div class="flex-row">
            <select id="keyDuration">
                <option value="12h">12 Hours Duration</option>
                <option value="24h">24 Hours Duration</option>
                <option value="lifetime">Lifetime Duration</option>
            </select>
            <button class="action-btn" onclick="generateKey()">Generate Key</button>
        </div>
        <input style="margin-top: 12px;" type="text" id="adminKeyOutput" readonly placeholder="Output key will be printed here">

        <span class="section-label">Universal Loader Code</span>
        <textarea id="loaderOutput" readonly></textarea>
    </div>

    <script>
        let sessionPass = "";
        
        function login() {
            sessionPass = document.getElementById('passInput').value;
            if(!sessionPass) return;
            document.getElementById('loginPanel').classList.add('hidden');
            document.getElementById('dashboardPanel').classList.remove('hidden');
            
            const loaderBox = document.getElementById('loaderOutput');
            loaderBox.value = `local key = "ENTER_KEY_HERE"\n(loadstring or load)(game:HttpGet("${window.location.origin}/v1/load?key=" .. game:GetService("HttpService"):UrlEncode(key) .. "&_cb=" .. tostring(os.clock()), true))()`;
        }

        async function saveScript() {
            const script = document.getElementById('scriptInput').value;
            const res = await fetch('/admin', {
                method: 'POST',
                body: JSON.stringify({ action: "save_script", password: sessionPass, script: script })
            });
            if(res.ok) alert("Script successfully deployed.");
            else alert("Authentication Error.");
        }

        async function generateKey() {
            const dur = document.getElementById('keyDuration').value;
            const res = await fetch('/admin', {
                method: 'POST',
                body: JSON.stringify({ action: "generate_key", password: sessionPass, duration: dur })
            });
            if(res.ok) {
                const data = await res.json();
                document.getElementById('adminKeyOutput').value = data.key;
            } else alert("Authentication Error.");
        }
    </script>
</body>
</html>
