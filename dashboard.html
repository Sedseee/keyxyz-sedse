<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEDSE TERMINAL</title>
    <style>
        :root { --text: #00ff41; --bg: #050505; --dot: #1a1a1a; }
        body {
            background-color: var(--bg);
            background-image: radial-gradient(var(--dot) 2px, transparent 2px);
            background-size: 24px 24px;
            font-family: 'Courier New', Courier, monospace;
            color: var(--text);
            padding: 20px; text-align: center; margin: 0;
        }
        .panel {
            max-width: 500px; margin: 20px auto;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--text);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
            padding: 20px; text-align: left;
        }
        h2 { text-align: center; text-transform: uppercase; border-bottom: 1px dashed var(--text); padding-bottom: 10px;}
        input, textarea, select, button {
            background: #000; color: var(--text);
            border: 1px solid var(--text);
            font-family: inherit; font-size: 14px;
            padding: 10px; width: 100%; box-sizing: border-box; margin-top: 10px;
        }
        button { font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:hover { background: var(--text); color: #000; }
        textarea { height: 120px; resize: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="loginPanel" class="panel">
        <h2>SYS_AUTH REQUIRED</h2>
        <input type="password" id="passInput" placeholder="Enter Admin Password...">
        <button onclick="login()">Access System</button>
    </div>

    <div id="dashboardPanel" class="panel hidden">
        <h2>SEDSE SYSTEM CONTROL</h2>
        
        <p>> UPLOAD OBFUSCATED SCRIPT:</p>
        <textarea id="scriptInput" placeholder="Paste your obfuscated lua here..."></textarea>
        <button onclick="saveScript()">DEPLOY SCRIPT</button>

        <br><br><br>
        <p>> GENERATE ADMIN KEY:</p>
        <select id="keyDuration">
            <option value="12h">12 Hours</option>
            <option value="24h">24 Hours</option>
            <option value="lifetime">Lifetime</option>
        </select>
        <button onclick="generateKey()">CREATE KEY</button>
        <input type="text" id="adminKeyOutput" readonly placeholder="Awaiting generation...">

        <br><br><br>
        <p>> UNIVERSAL LOADER:</p>
        <textarea id="loaderOutput" readonly>local key = "ENTER_KEY_HERE"
(loadstring or load)(game:HttpGet(window.location.origin + "/v1/load?key=" .. game:GetService("HttpService"):UrlEncode(key) .. "&_cb=" .. tostring(os.clock()), true))()</textarea>
    </div>

    <script>
        let sessionPass = "";
        
        function login() {
            sessionPass = document.getElementById('passInput').value;
            document.getElementById('loginPanel').classList.add('hidden');
            document.getElementById('dashboardPanel').classList.remove('hidden');
            
            // Fix loader origin dynamically
            const loaderBox = document.getElementById('loaderOutput');
            loaderBox.value = `local key = "ENTER_KEY_HERE"\n(loadstring or load)(game:HttpGet("${window.location.origin}/v1/load?key=" .. game:GetService("HttpService"):UrlEncode(key) .. "&_cb=" .. tostring(os.clock()), true))()`;
        }

        async function saveScript() {
            const script = document.getElementById('scriptInput').value;
            const res = await fetch('/admin', {
                method: 'POST',
                body: JSON.stringify({ action: "save_script", password: sessionPass, script: script })
            });
            if(res.ok) alert("Script Deployed Successfully!");
            else alert("Error: Unauthorized or Network failure.");
        }

        async function generateKey() {
            const dur = document.getElementById('keyDuration').value;
            const res = await fetch('/admin', {
                method: 'POST',
                body: JSON.stringify({ action: "generate_key", password: sessionPass, duration: dur })
            });
            if(res.ok) {
                const data = await res.json();
                document.getElementById('adminKeyOutput').value = data.key;
            } else alert("Error: Unauthorized!");
        }
    </script>
</body>
</html>
